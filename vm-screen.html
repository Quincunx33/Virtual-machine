<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web VM Screen</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss: https://* blob:; img-src 'self' data: https:; media-src 'self' blob:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: #050505;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            touch-action: none; 
            /* Subtle Texture Background */
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 3D Monitor Bezel & Scanlines */
        #screen_wrapper {
            position: relative;
            padding: 20px;
            background: #111;
            border-radius: 12px;
            box-shadow: 
                0 0 0 2px #333,
                0 0 50px rgba(0,0,0,0.8),
                inset 0 0 20px rgba(0,0,0,1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Scanline Overlay */
        .scanlines {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
            border-radius: 4px;
            opacity: 0.6;
        }

        #screen_container {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 4px;
            background: #000;
            position: relative;
            z-index: 5;
        }
        
        #screen_container > canvas,
        #screen_container > div {
            flex-shrink: 0;
            transform-origin: center center;
            box-shadow: 0 0 10px rgba(100, 255, 100, 0.1); 
        }
        
        /* 3D Assistive Touch Orb */
        .menu-container { position: relative; width: 64px; height: 64px; }
        
        #main-assistive-btn {
            background: radial-gradient(circle at 30% 30%, #4b5563, #1f2937);
            box-shadow: 
                inset -5px -5px 10px rgba(0,0,0,0.5),
                inset 5px 5px 10px rgba(255,255,255,0.1),
                0 10px 20px rgba(0,0,0,0.5);
            border: 2px solid #374151;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #main-assistive-btn:active { transform: scale(0.95); }

        .menu-items .menu-item {
            position: absolute;
            bottom: 4px;
            right: 4px;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28), opacity 0.3s ease;
            transform: translate(0, 0) scale(0.5);
            opacity: 0;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .menu-container.expanded .menu-items .menu-item {
            opacity: 1;
            pointer-events: auto;
        }
        .menu-container.expanded #main-assistive-btn { 
            transform: rotate(135deg); 
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
            border-color: #6366f1;
        }
        .menu-container.expanded .menu-item:nth-child(1) { transform: translate(-80px, 0px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(2) { transform: translate(-60px, -60px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(3) { transform: translate(0px, -80px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(4) { transform: translate(60px, -60px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(5) { transform: translate(80px, 0px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(6) { transform: translate(0px, 80px) scale(1); }

        /* 3D Mechanical Keyboard */
        #virtual-keyboard {
            background: #1f222a;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
            border-top: 1px solid #333;
        }
        .key {
            background: linear-gradient(to bottom, #374151, #1f2937);
            color: #d1d5db;
            border-radius: 6px;
            border-bottom: 4px solid #111827;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
            transition: all 0.05s ease;
            box-shadow: 0 4px 5px rgba(0,0,0,0.2);
            font-family: 'Space Mono', monospace;
            font-weight: 700;
        }
        .key:active, .key.pressed {
            transform: translateY(3px);
            border-bottom-width: 0px;
            background: linear-gradient(to bottom, #4f46e5, #4338ca);
            color: white;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        .key-special {
            background: linear-gradient(to bottom, #2d313a, #1a1c23);
            font-size: 0.65rem;
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen antialiased">

    <!-- Global Error Overlay -->
    <div id="error-overlay" class="absolute inset-0 bg-red-950/95 z-[100] hidden flex flex-col items-center justify-center p-8 text-center backdrop-blur-sm">
        <div class="w-20 h-20 rounded-full bg-red-900/50 flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(220,38,38,0.5)]">
            <i class="fas fa-bug text-4xl text-red-200"></i>
        </div>
        <h2 class="text-3xl font-bold text-white mb-2 font-[Space_Mono]">SYSTEM HALTED</h2>
        <p id="error-message" class="text-red-300 mb-8 font-mono text-sm break-all max-w-lg border border-red-800 p-4 rounded bg-black/50">Unknown Error</p>
        <button id="reload-btn" class="px-8 py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-500 transition-colors shadow-[0_4px_0_#7f1d1d] active:translate-y-1 active:shadow-none">
            <i class="fas fa-redo mr-2"></i> SYSTEM REBOOT
        </button>
    </div>

    <!-- Main Container -->
    <div class="w-full h-full flex items-center justify-center p-2 sm:p-8">
        <div id="screen_wrapper">
            <div class="scanlines"></div>
            <div id="screen_container">
                <!-- libv86 elements will be injected here -->
                <div style="white-space: pre; font: 14px monospace; line-height: 14px; position: relative; background: black;"></div>
                <canvas style="display: none; background: black;"></canvas>
            </div>
        </div>
    </div>

    <!-- Loading State -->
    <div id="loading-indicator" class="fixed inset-0 flex flex-col items-center justify-center z-20 text-center bg-[#050505] z-[60]">
        <div class="relative w-24 h-24">
            <div class="absolute inset-0 border-4 border-indigo-900 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-t-indigo-500 rounded-full animate-spin"></div>
        </div>
        <p id="loading-text" class="mt-8 text-white text-xl font-[Space_Mono] tracking-widest uppercase">Initializing Core...</p>
        <p class="text-indigo-400 text-xs mt-2 font-mono animate-pulse">Mounting Virtual Filesystems</p>
    </div>

    <!-- 3D Assistive Touch Menu -->
    <div id="assistive-touch" class="fixed z-50" style="bottom: 1.5rem; right: 1.5rem;">
        <div class="menu-container">
            <div class="menu-items absolute bottom-0 right-0 w-16 h-16">
                <button id="vm-fullscreen-btn" class="menu-item w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center text-white" title="Fullscreen"><i class="fas fa-expand"></i></button>
                <button id="vm-keyboard-btn" class="menu-item w-12 h-12 bg-gray-700 rounded-full flex items-center justify-center text-white" title="Toggle Keyboard"><i class="far fa-keyboard"></i></button>
                <button id="vm-cad-btn" class="menu-item w-12 h-12 bg-red-900 rounded-full flex items-center justify-center text-white border-red-700" title="Send Ctrl+Alt+Del"><i class="fas fa-bolt"></i></button>
                <button id="vm-save-btn" class="menu-item w-12 h-12 bg-green-700 rounded-full flex items-center justify-center text-white border-green-600" title="Save Snapshot"><i class="fas fa-save"></i></button>
                <button id="vm-reset-btn" class="menu-item w-12 h-12 bg-yellow-700 rounded-full flex items-center justify-center text-white border-yellow-600" title="Reset"><i class="fas fa-sync-alt"></i></button>
                <button id="vm-power-btn" class="menu-item w-12 h-12 bg-red-700 rounded-full flex items-center justify-center text-white border-red-600" title="Shutdown"><i class="fas fa-power-off"></i></button>
            </div>
            <button id="main-assistive-btn" class="w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl z-20 relative">
                <i class="fas fa-th-large drop-shadow-md"></i>
            </button>
        </div>
    </div>
    
    <!-- Virtual Keyboard (Mechanical Style) -->
    <div id="virtual-keyboard" class="fixed bottom-0 left-0 right-0 p-1 sm:p-3 z-30 hidden pb-6 sm:pb-4 transition-transform duration-300">
        <div class="max-w-5xl mx-auto space-y-1 sm:space-y-1.5 text-white">
            <div class="key-row flex justify-center space-x-1"><button class="key key-special flex-1 h-10" data-scancode="01">ESC</button><button class="key key-special flex-1 h-10" data-scancode="3B">F1</button><button class="key key-special flex-1 h-10" data-scancode="3C">F2</button><button class="key key-special flex-1 h-10" data-scancode="3D">F3</button><button class="key key-special flex-1 h-10" data-scancode="3E">F4</button><button class="key key-special flex-1 h-10" data-scancode="3F">F5</button><button class="key key-special flex-1 h-10" data-scancode="40">F6</button><button class="key key-special flex-1 h-10" data-scancode="41">F7</button><button class="key key-special flex-1 h-10" data-scancode="42">F8</button><button class="key key-special flex-1 h-10" data-scancode="43">F9</button><button class="key key-special flex-1 h-10" data-scancode="44">F10</button><button class="key key-special flex-1 h-10" data-scancode="57">F11</button><button class="key key-special flex-1 h-10" data-scancode="58">F12</button></div>
            <div class="key-row flex justify-center space-x-1"><button class="key flex-1 h-12" data-scancode="29">`</button><button class="key flex-1 h-12" data-scancode="02">1</button><button class="key flex-1 h-12" data-scancode="03">2</button><button class="key flex-1 h-12" data-scancode="04">3</button><button class="key flex-1 h-12" data-scancode="05">4</button><button class="key flex-1 h-12" data-scancode="06">5</button><button class="key flex-1 h-12" data-scancode="07">6</button><button class="key flex-1 h-12" data-scancode="08">7</button><button class="key flex-1 h-12" data-scancode="09">8</button><button class="key flex-1 h-12" data-scancode="0A">9</button><button class="key flex-1 h-12" data-scancode="0B">0</button><button class="key flex-1 h-12" data-scancode="0C">-</button><button class="key flex-1 h-12" data-scancode="0D">=</button><button class="key key-special h-12 basis-20 sm:basis-24" data-scancode="0E">←</button></div>
            <div class="key-row flex justify-center space-x-1"><button class="key key-special h-12 basis-16 sm:basis-20" data-scancode="0F">TAB</button><button class="key flex-1 h-12" data-scancode="10">Q</button><button class="key flex-1 h-12" data-scancode="11">W</button><button class="key flex-1 h-12" data-scancode="12">E</button><button class="key flex-1 h-12" data-scancode="13">R</button><button class="key flex-1 h-12" data-scancode="14">T</button><button class="key flex-1 h-12" data-scancode="15">Y</button><button class="key flex-1 h-12" data-scancode="16">U</button><button class="key flex-1 h-12" data-scancode="17">I</button><button class="key flex-1 h-12" data-scancode="18">O</button><button class="key flex-1 h-12" data-scancode="19">P</button><button class="key flex-1 h-12" data-scancode="1A">[</button><button class="key flex-1 h-12" data-scancode="1B">]</button><button class="key flex-1 h-12" data-scancode="2B">\</button></div>
            <div class="key-row flex justify-center space-x-1"><button class="key key-special h-12 basis-20 sm:basis-24" data-scancode="3A">CAPS</button><button class="key flex-1 h-12" data-scancode="1E">A</button><button class="key flex-1 h-12" data-scancode="1F">S</button><button class="key flex-1 h-12" data-scancode="20">D</button><button class="key flex-1 h-12" data-scancode="21">F</button><button class="key flex-1 h-12" data-scancode="22">G</button><button class="key flex-1 h-12" data-scancode="23">H</button><button class="key flex-1 h-12" data-scancode="24">J</button><button class="key flex-1 h-12" data-scancode="25">K</button><button class="key flex-1 h-12" data-scancode="26">L</button><button class="key flex-1 h-12" data-scancode="27">;</button><button class="key flex-1 h-12" data-scancode="28">'</button><button class="key key-special h-12 basis-20 sm:basis-24 text-green-400" data-scancode="1C">ENTER</button></div>
            <div class="key-row flex justify-center space-x-1"><button class="key key-special h-12 basis-24 sm:basis-28" data-scancode="2A">SHIFT</button><button class="key flex-1 h-12" data-scancode="2C">Z</button><button class="key flex-1 h-12" data-scancode="2D">X</button><button class="key flex-1 h-12" data-scancode="2E">C</button><button class="key flex-1 h-12" data-scancode="2F">V</button><button class="key flex-1 h-12" data-scancode="30">B</button><button class="key flex-1 h-12" data-scancode="31">N</button><button class="key flex-1 h-12" data-scancode="32">M</button><button class="key flex-1 h-12" data-scancode="33">,</button><button class="key flex-1 h-12" data-scancode="34">.</button><button class="key flex-1 h-12" data-scancode="35">/</button><button class="key key-special h-12 basis-24 sm:basis-28" data-scancode="36">SHIFT</button></div>
            <div class="key-row flex justify-center space-x-1">
                <button class="key key-special h-12 basis-14 sm:basis-16" data-scancode="1D">CTRL</button>
                <button class="key key-special h-12 basis-14 sm:basis-16" data-scancode="E0 5B"><i class="fab fa-windows"></i></button>
                <button class="key key-special h-12 basis-14 sm:basis-16" data-scancode="38">ALT</button>
                <button class="key flex-grow h-12" data-scancode="39"></button>
                <button class="key key-special h-12 basis-14 sm:basis-16" data-scancode="E0 38">ALT</button>
                <div class="flex flex-col space-y-0.5 basis-24 sm:basis-32">
                    <button class="key w-full h-5 text-[10px]" data-scancode="E0 48">▲</button>
                    <div class="flex space-x-0.5">
                        <button class="key w-1/3 h-6 text-[10px]" data-scancode="E0 4B">◀</button>
                        <button class="key w-1/3 h-6 text-[10px]" data-scancode="E0 50">▼</button>
                        <button class="key w-1/3 h-6 text-[10px]" data-scancode="E0 4D">▶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="libv86.js"></script>
    <script src="vm-manager.js"></script>
</body>
</html>
