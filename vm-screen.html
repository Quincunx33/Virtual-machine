<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web VM Screen</title>
    <!-- Stricter CSP: scripts only from self and trusted CDNs -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' blob: https://cdn.tailwindcss.com https://cdnjs.cloudflare.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss: https://* blob:; img-src 'self' data: https:; media-src 'self' blob:;">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: #000;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            touch-action: none; /* Prevent browser zooming/panning */
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #virtual-keyboard { user-select: none; -webkit-user-select: none; touch-action: manipulation; }
        .key { transition: background-color 0.1s ease; }
        .key.pressed { background-color: #4f46e5; transform: scale(0.98); }

        /* 
           FIX: Use Flexbox for robust centering. 
           This ensures the VM screen is always in the middle, regardless of aspect ratio.
        */
        #screen_container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }
        
        /* 
           Target the canvas and text div injected by libv86.
           We prevent them from shrinking so JS can scale them down accurately.
        */
        #screen_container > canvas,
        #screen_container > div {
            flex-shrink: 0;
            transform-origin: center center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5); /* Nice glow for the screen */
        }
        
        /* Assistive Touch Menu */
        .menu-container { position: relative; width: 56px; height: 56px; }
        .menu-items .menu-item {
            position: absolute;
            bottom: 2px;
            right: 2px;
            transition: transform 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28), opacity 0.3s ease;
            transform: translate(0, 0) scale(0.5);
            opacity: 0;
            pointer-events: none;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .menu-container.expanded .menu-items .menu-item {
            transform-origin: center;
            opacity: 1;
            pointer-events: auto;
        }
        .menu-container.expanded #main-assistive-btn { transform: rotate(135deg); }
        .menu-container.expanded .menu-item:nth-child(1) { transform: translate(-70px, 0px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(2) { transform: translate(-50px, -50px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(3) { transform: translate(0px, -70px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(4) { transform: translate(50px, -50px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(5) { transform: translate(70px, 0px) scale(1); }
        .menu-container.expanded .menu-item:nth-child(6) { transform: translate(0px, 70px) scale(1); }
        #assistive-touch { cursor: grab; }
        #assistive-touch:active { cursor: grabbing; }
    </style>
</head>
<body class="bg-gray-900 text-gray-300 flex items-center justify-center h-screen antialiased">

    <!-- Global Error Overlay -->
    <div id="error-overlay" class="absolute inset-0 bg-red-900/95 z-[100] hidden flex flex-col items-center justify-center p-8 text-center">
        <i class="fas fa-bug text-6xl text-white mb-6"></i>
        <h2 class="text-2xl font-bold text-white mb-2">Something went wrong</h2>
        <p id="error-message" class="text-red-200 mb-8 font-mono text-sm break-all max-w-lg">Unknown Error</p>
        <button id="reload-btn" class="px-6 py-3 bg-white text-red-900 font-bold rounded-lg hover:bg-gray-200 transition-colors shadow-lg">
            <i class="fas fa-redo mr-2"></i> Reload Page
        </button>
    </div>

    <div id="screen_container">
        <!-- libv86 elements will be injected here -->
        <div style="white-space: pre; font: 14px monospace; line-height: 14px; position: relative; background: black;"></div>
        <canvas style="display: none; background: black;"></canvas>
    </div>

    <div id="loading-indicator" class="fixed inset-0 flex flex-col items-center justify-center z-20 text-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="spinner"></div>
        <p id="loading-text" class="mt-4 text-white text-lg font-semibold">Initializing VM...</p>
        <p class="text-gray-400 text-xs mt-2">Tap screen to enable sound</p>
    </div>

    <!-- iOS-style Assistive Touch Menu -->
    <div id="assistive-touch" class="fixed z-50" style="bottom: 1.25rem; right: 1.25rem;">
        <div class="menu-container">
            <div class="menu-items absolute bottom-0 right-0 w-14 h-14">
                <button id="vm-fullscreen-btn" class="menu-item w-12 h-12 bg-blue-600/80 rounded-full flex items-center justify-center text-white shadow-md" title="Fullscreen"><i class="fas fa-expand"></i></button>
                <button id="vm-keyboard-btn" class="menu-item w-12 h-12 bg-blue-600/80 rounded-full flex items-center justify-center text-white shadow-md" title="Toggle Keyboard"><i class="far fa-keyboard"></i></button>
                <button id="vm-cad-btn" class="menu-item w-12 h-12 bg-blue-600/80 rounded-full flex items-center justify-center text-white shadow-md" title="Send Ctrl+Alt+Del"><i class="fas fa-bolt"></i></button>
                <button id="vm-save-btn" class="menu-item w-12 h-12 bg-green-600/80 rounded-full flex items-center justify-center text-white shadow-md" title="Save Snapshot"><i class="fas fa-save"></i></button>
                <button id="vm-reset-btn" class="menu-item w-12 h-12 bg-orange-500/80 rounded-full flex items-center justify-center text-white shadow-md" title="Reset"><i class="fas fa-sync-alt"></i></button>
                <button id="vm-power-btn" class="menu-item w-12 h-12 bg-red-600/80 rounded-full flex items-center justify-center text-white shadow-md" title="Shutdown"><i class="fas fa-power-off"></i></button>
            </div>
            <button id="main-assistive-btn" class="w-14 h-14 bg-gray-800/70 backdrop-blur-sm border border-gray-500/50 rounded-full flex items-center justify-center text-white text-2xl shadow-lg transition-transform duration-300 hover:scale-110">
                <i class="fas fa-th-large"></i>
            </button>
        </div>
    </div>
    
    <!-- Virtual Keyboard -->
    <div id="virtual-keyboard" class="fixed bottom-0 left-0 right-0 bg-gray-800/80 backdrop-blur-sm p-1 sm:p-2 z-30 hidden">
        <div class="max-w-4xl mx-auto space-y-1 text-white">
            <div class="key-row flex justify-center space-x-0.5 sm:space-x-1"><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="01">Esc</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="3B">F1</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="3C">F2</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="3D">F3</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="3E">F4</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="3F">F5</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="40">F6</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="41">F7</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="42">F8</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="43">F9</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="44">F10</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="57">F11</button><button class="key flex-1 h-8 bg-gray-700/80 rounded text-xs" data-scancode="58">F12</button></div>
            <div class="key-row flex justify-center space-x-0.5 sm:space-x-1"><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="29">`</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="02">1</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="03">2</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="04">3</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="05">4</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="06">5</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="07">6</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="08">7</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="09">8</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="0A">9</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="0B">0</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="0C">-</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="0D">=</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-16 sm:basis-24 text-xs sm:text-sm" data-scancode="0E">Backspace</button></div>
            <div class="key-row flex justify-center space-x-0.5 sm:space-x-1"><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-20 text-xs sm:text-sm" data-scancode="0F">Tab</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="10">Q</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="11">W</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="12">E</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="13">R</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="14">T</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="15">Y</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="16">U</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="17">I</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="18">O</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="19">P</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="1A">[</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="1B">]</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="2B">\</button></div>
            <div class="key-row flex justify-center space-x-0.5 sm:space-x-1"><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-16 sm:basis-24 text-xs sm:text-sm" data-scancode="3A">Caps Lock</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="1E">A</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="1F">S</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="20">D</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="21">F</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="22">G</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="23">H</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="24">J</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="25">K</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="26">L</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="27">;</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="28">'</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-16 sm:basis-24 text-xs sm:text-sm" data-scancode="1C">Enter</button></div>
            <div class="key-row flex justify-center space-x-0.5 sm:space-x-1"><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-20 sm:basis-28 text-xs sm:text-sm" data-scancode="2A">Shift</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="2C">Z</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="2D">X</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="2E">C</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="2F">V</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="30">B</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="31">N</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="32">M</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="33">,</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="34">.</button><button class="key flex-1 h-8 sm:h-10 bg-gray-700 rounded" data-scancode="35">/</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-20 sm:basis-28 text-xs sm:text-sm" data-scancode="36">Shift</button></div>
            <div class="key-row flex justify-center space-x-0.5 sm:space-x-1"><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-16 text-xs sm:text-sm" data-scancode="1D">Ctrl</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-16 text-xs sm:text-sm" data-scancode="E0 5B">Win</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-16 text-xs sm:text-sm" data-scancode="38">Alt</button><button class="key flex-grow h-8 sm:h-10 bg-gray-700 rounded" data-scancode="39">Space</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-16 text-xs sm:text-sm" data-scancode="E0 38">Alt</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-16 text-xs sm:text-sm" data-scancode="E0 5D">Menu</button><button class="key h-8 sm:h-10 bg-gray-700 rounded basis-14 sm:basis-16 text-xs sm:text-sm" data-scancode="E0 1D">Ctrl</button><div class="flex flex-col space-y-1 basis-24 sm:basis-32"><button class="key w-full h-4 sm:h-5 bg-gray-700 rounded text-xs" data-scancode="E0 48">▲</button><div class="flex space-x-1"><button class="key w-1/3 h-4 sm:h-5 bg-gray-700 rounded text-xs" data-scancode="E0 4B">◀</button><button class="key w-1/3 h-4 sm:h-5 bg-gray-700 rounded text-xs" data-scancode="E0 50">▼</button><button class="key w-1/3 h-4 sm:h-5 bg-gray-700 rounded text-xs" data-scancode="E0 4D">▶</button></div></div></div>
        </div>
    </div>

    <script src="libv86.js"></script>
    <script src="vm-manager.js"></script>
</body>
</html>
